services:
  - type: web
    name: grocery-deals-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: CORS_ALLOW_ORIGIN
        sync: false
      - key: API_ONLY_MODE
        value: "true"
