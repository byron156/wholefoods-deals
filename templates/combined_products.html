<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b6b45">
<title>Whole Foods Deals</title>
<link rel="stylesheet" href="/static/styles.css">
<link rel="icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
</head>

<body class="app-body">
<div class="app-shell">
    <header class="app-header">
        <div>
            <h1>Deals</h1>
            <p class="app-summary-line" id="summary-line">One feed. Three stores.</p>
        </div>
    </header>

    <section class="search-panel">
        <label class="sr-only" for="global-search">Search deals</label>
        <input id="global-search" class="search-input app-search" type="search" placeholder="Search products, brands or categories...">
        <div class="chip-row" id="retailer-chip-row"></div>
        <div class="status-row">
            <div class="search-meta" id="search-meta">Showing {{ deal_count }} products</div>
            <div class="mini-pill" id="store-summary">Store: Columbus Circle</div>
        </div>
    </section>

    <section class="panel is-active single-feed-panel">
        <div class="section-head">
            <div>
                <h2 id="feed-title">Top Deals</h2>
                <p id="for-you-copy">The best matches for what you've been upvoting.</p>
            </div>
            <div class="mini-pill" id="for-you-count">0 deals</div>
        </div>
        <div class="chip-row" id="for-you-highlights"></div>
        <div class="product-grid" id="for-you-grid"></div>
    </section>
</div>

<script id="app-data" type="application/json">
{{ {"products": products, "stores": available_stores}|tojson }}
</script>
<script src="/static/app-shell.js"></script>

<noscript>
    <section class="noscript-fallback">
        <h2>Deals</h2>
        <div class="grid">
        {% for p in products[:48] %}
            <div class="card">
                {% if p.image %}
                <div class="product-image">
                    <img src="{{ p.image }}" alt="{{ p.name }}">
                </div>
                {% endif %}
                <h2>{{ p.name }}</h2>
                <p class="retailer-row">
                    <span class="retailer-badge">{{ p.retailer or "Whole Foods" }}</span>
                    {% if p.category %}<span class="retailer-category">{{ p.category }}</span>{% endif %}
                </p>
                {% if p.prime_price %}<p class="prime">{{ p.prime_price }}</p>{% endif %}
                {% if p.basis_price %}<p class="regular regular-prominent">Regular {{ p.basis_price }}</p>{% endif %}
                {% if p.discount %}<p class="discount">{{ p.discount }}</p>{% endif %}
            </div>
        {% endfor %}
        </div>
    </section>
</noscript>
</body>
</html>
