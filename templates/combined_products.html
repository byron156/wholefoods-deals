<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b6b45">
<title>Grocery Deals</title>
<link rel="stylesheet" href="/static/styles.css?v=20260409a">
<link rel="icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest?v=20260409a">
</head>

<body class="app-body">
<div class="app-shell">
    <header class="app-header">
        <h1>Grocery Deals</h1>
    </header>

    <section class="search-panel">
        <label class="sr-only" for="global-search">Search deals</label>
        <input id="global-search" class="search-input app-search" type="search" placeholder="Search items or brands">
        <div class="chip-row" id="retailer-chip-row"></div>
        <div class="status-row">
            <div class="search-meta" id="search-meta">{{ deal_count }} live deals</div>
        </div>
    </section>

    <section class="panel is-active single-feed-panel">
        <div class="product-grid" id="feed-grid"></div>
    </section>
</div>

<div class="sheet-backdrop hidden" id="category-sheet-backdrop"></div>
<section class="category-sheet hidden" id="category-sheet" aria-hidden="true">
    <div class="sheet-header">
        <div>
            <h3 id="category-sheet-title">Improve this item</h3>
            <p id="category-sheet-copy">Fix the shelf or brand for this item so the app gets smarter.</p>
        </div>
        <button class="ghost-button" type="button" id="category-sheet-close">Close</button>
    </div>
    <div class="chip-row" id="category-scope-row"></div>
    <div class="sheet-field">
        <label for="category-select">Suggested category</label>
        <select id="category-select" class="sheet-select"></select>
    </div>
    <div class="sheet-field">
        <label for="subcategory-select">Move to subcategory</label>
        <select id="subcategory-select" class="sheet-select"></select>
        <button class="primary-button" type="button" id="queue-subcategory-fix">Send shelf feedback</button>
    </div>
    <div class="sheet-field">
        <label for="brand-fix-input">Fix brand name</label>
        <input id="brand-fix-input" class="search-input" type="text" placeholder="Brand name">
        <button class="ghost-button" type="button" id="queue-brand-fix">Send brand feedback</button>
    </div>
</section>

<script id="app-data" type="application/json">
{{ {"products": products, "stores": available_stores, "categories": category_names, "subcategory_options": subcategory_options, "category_order": category_order, "feedback_endpoint": feedback_endpoint, "profile_endpoint": profile_endpoint, "feed_endpoint": feed_endpoint}|tojson }}
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.getRegistrations().then((registrations) => {
    registrations.forEach((registration) => registration.unregister());
  }).catch(() => {});
}
if ("caches" in window) {
  caches.keys().then((keys) => {
    keys.forEach((key) => {
      if (key.indexOf("wholefoods-deals") !== -1) {
        caches.delete(key);
      }
    });
  }).catch(() => {});
}
</script>
<script src="/static/app-shell.js?v=20260409a"></script>

<noscript>
    <section class="noscript-fallback">
        <h2>Deals</h2>
        <div class="grid">
        {% for p in products[:48] %}
            <div class="card">
                {% if p.image %}
                <div class="product-image">
                    <img src="{{ p.image }}" alt="{{ p.name }}">
                </div>
                {% endif %}
                <h2>{{ p.name }}</h2>
                <p class="retailer-row">
                    <span class="retailer-badge">{{ p.retailer or "Whole Foods" }}</span>
                    {% if p.category %}<span class="retailer-category">{{ p.category }}</span>{% endif %}
                </p>
                {% if p.prime_price %}<p class="prime">{{ p.prime_price }}</p>{% endif %}
                {% if p.basis_price %}<p class="regular regular-prominent">Regular {{ p.basis_price }}</p>{% endif %}
                {% if p.discount %}<p class="discount">{{ p.discount }}</p>{% endif %}
            </div>
        {% endfor %}
        </div>
    </section>
</noscript>
</body>
</html>
